<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6fb;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        .header {
            background: linear-gradient(135deg, #3B72E8, #6C4FDB);
            padding: 32px;
            text-align: center;
        }

        .header h1 {
            color: #fff;
            margin: 0;
            font-size: 1.5rem;
        }

        .body {
            padding: 32px;
            color: #3D5449;
            line-height: 1.7;
        }

        .btn {
            display: inline-block;
            margin: 24px 0;
            padding: 14px 32px;
            background: #3B72E8;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
        }

        .footer {
            background: #f4f6fb;
            padding: 16px 32px;
            text-align: center;
            font-size: 0.8rem;
            color: #8892a4;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Placement Management System</h1>
        </div>
        <div class="body">
            <p>Hi <strong>{{Name}}</strong>,</p>
            <p>Your account has been deactivated.</p>
            <p>Deactivated by: <strong>{{DeactivatedBy}}</strong></p>
        </div>
            <p>Kindly contact your administrator for further assistance.</p>
        </div>
        <div class="footer">© 2025 Placement Management System. All rights reserved.</div>
    </div>
</body>

</html>
